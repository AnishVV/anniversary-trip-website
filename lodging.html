<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lodging</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="event-header">
    <div class="day-label">Friday &ndash; Saturday</div>
    <h1>Lodging</h1>
    <div class="time"><!-- check-in / check-out --></div>
  </div>

  <div class="container">
    <div class="detail-block">
      <h3>Where</h3>
      <p><!-- hotel / rental name and address --></p>
    </div>
    <div class="detail-block">
      <h3>Check-in</h3>
      <p><!-- check-in time and instructions --></p>
    </div>
    <div class="detail-block">
      <h3>Check-out</h3>
      <p><!-- check-out time --></p>
    </div>
    <div class="detail-block">
      <h3>Notes</h3>
      <p><!-- WiFi, parking, etc. --></p>
    </div>
    <a class="back-link" href="index.html">&larr; Back to itinerary</a>
  </div>
</body>
</html>
