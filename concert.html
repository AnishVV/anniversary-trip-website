<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concert</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="event-header">
    <div class="day-label">Saturday</div>
    <h1>Concert</h1>
    <div class="time"><!-- time / doors open --></div>
  </div>

  <div class="container">
    <div class="detail-block">
      <h3>Artist / Show</h3>
      <p><!-- who's playing --></p>
    </div>
    <div class="detail-block">
      <h3>Venue</h3>
      <p><!-- venue name and address --></p>
    </div>
    <div class="detail-block">
      <h3>Tickets</h3>
      <p><!-- ticket info --></p>
    </div>
    <div class="detail-block">
      <h3>Notes</h3>
      <p><!-- bag policy, parking, etc. --></p>
    </div>
    <a class="back-link" href="index.html">&larr; Back to itinerary</a>
  </div>

</html>
